<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Linnux Tech</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:     #080c14;
      --amber:  #f5a623;
      --cyan:   #38bdf8;
      --green:  #4ade80;
      --red:    #f87171;
      --dim:    #1c2a42;
      --muted:  #2a3d58;
      --text:   #94a3b8;
      --bright: #f1f5f9;
      --mono:   'IBM Plex Mono', monospace;
      --serif:  'DM Serif Display', serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: var(--bg); overflow: hidden; font-family: var(--mono); }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: .03; pointer-events: none; z-index: 50;
    }

    /* Scanlines */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,.08) 3px, rgba(0,0,0,.08) 4px);
      pointer-events: none; z-index: 51;
    }

    /* Vignette */
    #vignette {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,.75) 100%);
      pointer-events: none; z-index: 9;
    }

    /* ── LAYOUT ── */
    #splash {
      position: relative; z-index: 10;
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0; padding: 1rem;
    }

    /* ── WORDMARK ── */
    #wordmark {
      text-align: center;
      margin-bottom: 2.4rem;
      opacity: 0;
      animation: fadeUp .7s .1s forwards;
    }

    #wordmark .name {
      font-family: var(--serif);
      font-size: clamp(2.4rem, 9vw, 4rem);
      color: var(--bright);
      line-height: 1;
      display: block;
    }

    #wordmark .name em { font-style: italic; color: var(--amber); }

    @keyframes wordGlitch {
      0%   { text-shadow:  3px 0 var(--cyan), -3px 0 var(--red); transform: skewX(-3deg); }
      20%  { text-shadow: -3px 0 var(--cyan),  3px 0 var(--red); transform: skewX(3deg); }
      40%  { text-shadow:  2px 2px var(--red); transform: skewX(-1deg); }
      60%  { text-shadow: none; transform: skewX(1deg); }
      100% { text-shadow: none; transform: none; }
    }
    #wordmark.glitch .name { animation: wordGlitch .5s steps(1) forwards; }

    #wordmark .sub {
      display: block;
      font-family: var(--mono);
      font-size: clamp(.58rem, 2.2vw, .7rem);
      letter-spacing: .28em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: .65rem;
    }

    /* ── TERMINAL WINDOW ── */
    #term-wrap {
      width: min(500px, 92vw);
      opacity: 0;
      animation: fadeUp .5s .6s forwards;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0,0,0,.6), 0 0 0 1px var(--dim);
    }

    /* Title bar */
    .term-bar {
      background: #1a2234;
      padding: .55rem 1rem;
      display: flex;
      align-items: center;
      gap: .45rem;
      border-bottom: 1px solid var(--dim);
      user-select: none;
    }

    .tdot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
    .tdot.r { background: #f87171; }
    .tdot.y { background: #f5a623; }
    .tdot.g { background: #4ade80; }

    .term-title-text {
      flex: 1;
      text-align: center;
      font-size: .68rem;
      color: var(--muted);
      letter-spacing: .08em;
      margin-left: -33px; /* optical center past the dots */
    }

    /* Body — fixed height, NO overflow scroll, clip only */
    .term-body {
      background: #060a10;
      padding: 0;
      height: 220px;
      overflow: hidden;
      position: relative;
    }

    /* Fade masks top & bottom */
    .term-body::before,
    .term-body::after {
      content: '';
      position: absolute; left: 0; right: 0;
      height: 52px;
      z-index: 5;
      pointer-events: none;
    }
    .term-body::before { top: 0;    background: linear-gradient(to bottom, #060a10, transparent); }
    .term-body::after  { bottom: 0; background: linear-gradient(to top,    #060a10, transparent); }

    /* The scrolling strip — position absolute, moves via JS */
    #term-lines {
      position: absolute;
      left: 0; right: 0;
      top: 0;
      padding: 0 1.2rem;
      will-change: transform;
      transition: transform .42s cubic-bezier(.4,0,.2,1);
    }

    .tline {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: .5rem;
      font-size: clamp(.7rem, 2.6vw, .78rem);
      height: 44px;
      white-space: nowrap;
      transition: opacity .4s, filter .4s;
      opacity: .15;
      filter: blur(.8px);
    }

    .tline.near   { opacity: .4;  filter: blur(.3px); }
    .tline.active { opacity: 1;   filter: none; }

    .tline .lhs { display: flex; gap: .45rem; align-items: center; overflow: hidden; }
    .tline .prompt { color: var(--amber); flex-shrink: 0; font-weight: 600; }
    .tline .mod    { color: var(--cyan);  flex-shrink: 0; font-weight: 500; }
    .tline .arr    { color: var(--muted); flex-shrink: 0; }
    .tline .msg    { color: var(--text);  overflow: hidden; text-overflow: ellipsis; }

    .tline.active .prompt { color: var(--amber); }
    .tline.active .mod    { color: var(--cyan);  }
    .tline.active .msg    { color: var(--bright);}

    .badge {
      font-size: .6rem;
      padding: .12rem .42rem;
      border-radius: 2px;
      letter-spacing: .1em;
      flex-shrink: 0;
    }
    .badge.ok   { color: var(--green); border: 1px solid rgba(74,222,128,.3); }
    .badge.warn { color: var(--amber); border: 1px solid rgba(245,166,35,.3); }
    .badge.info { color: var(--cyan);  border: 1px solid rgba(56,189,248,.3); }

    /* cursor blink */
    .tline.active .msg::after {
      content: '▌';
      color: var(--amber);
      animation: blink .8s step-end infinite;
      margin-left: 2px;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── ACCESS GRANTED overlay ── */
    #access-granted {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: .4rem;
      background: #060a10;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
    }

    #access-granted.show { opacity: 1; }

    #access-granted .ag-text {
      font-family: var(--mono);
      font-size: clamp(1.2rem, 5vw, 1.6rem);
      font-weight: 600;
      letter-spacing: .18em;
      color: var(--green);
      text-shadow: 0 0 30px rgba(74,222,128,.6);
      animation: agPulse 1s ease-in-out infinite alternate;
    }

    #access-granted .ag-sub {
      font-size: .65rem;
      letter-spacing: .22em;
      color: var(--muted);
      text-transform: uppercase;
    }

    @keyframes agPulse {
      from { text-shadow: 0 0 20px rgba(74,222,128,.4); }
      to   { text-shadow: 0 0 50px rgba(74,222,128,.9), 0 0 80px rgba(74,222,128,.3); }
    }

    /* scanline flicker on ACCESS GRANTED */
    #access-granted::after {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(74,222,128,.03) 3px, rgba(74,222,128,.03) 4px
      );
      pointer-events: none;
    }

    /* ── PROGRESS ── */
    #prog-wrap {
      width: min(500px, 92vw);
      margin-top: 1.2rem;
      opacity: 0;
      animation: fadeUp .5s .8s forwards;
    }

    #prog-track { height: 2px; background: var(--dim); border-radius: 2px; overflow: hidden; }
    #prog-fill  { height: 100%; width: 0%; background: linear-gradient(to right, var(--amber), var(--cyan)); border-radius: 2px; transition: width .45s ease; box-shadow: 0 0 8px rgba(245,166,35,.5); }

    #prog-meta {
      display: flex; justify-content: space-between;
      margin-top: .45rem;
      font-size: .62rem; color: var(--muted); letter-spacing: .08em;
    }
    #prog-pct { color: var(--amber); }

    /* ── ENTER BUTTON ── */
    #enter-wrap {
      margin-top: 2.2rem;
      opacity: 0; transform: translateY(8px);
      transition: opacity .5s, transform .5s;
      text-align: center;
    }
    #enter-wrap.show { opacity: 1; transform: none; }

    #enter-btn {
      font-family: var(--mono);
      font-size: .76rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      padding: .8rem 3rem;
      background: transparent;
      border: 1px solid var(--amber);
      color: var(--amber);
      cursor: pointer;
      border-radius: 2px;
      position: relative; overflow: hidden;
      transition: color .25s;
    }
    #enter-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--amber);
      transform: scaleX(0); transform-origin: left;
      transition: transform .3s ease; z-index: 0;
    }
    #enter-btn span { position: relative; z-index: 1; }
    #enter-btn:hover { color: var(--bg); }
    #enter-btn:hover::before { transform: scaleX(1); }

    #enter-hint { margin-top: .6rem; font-size: .6rem; color: var(--dim); letter-spacing: .12em; }

    /* ── CURTAIN ── */
    #curtain { position: fixed; inset: 0; background: var(--bg); z-index: 999; opacity: 0; pointer-events: none; transition: opacity .6s; }
    #curtain.on { opacity: 1; pointer-events: all; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: none; }
    }
  </style>
</head>
<body>
<div id="curtain"></div>
<div id="vignette"></div>

<div id="splash">

  <div id="wordmark">
    <span class="name">Linn<em>ux</em>Tech</span>
    <span class="sub">Security · Data · Automation</span>
  </div>

  <div id="term-wrap">
    <!-- title bar -->
    <div class="term-bar">
      <div class="tdot r"></div>
      <div class="tdot y"></div>
      <div class="tdot g"></div>
      <span class="term-title-text">linnuxtech@init: ~/boot.sh</span>
    </div>
    <!-- body -->
    <div class="term-body">
      <div id="term-lines"></div>
      <div id="access-granted">
        <span class="ag-text">ACCESS GRANTED</span>
        <span class="ag-sub">// linnuxtech online</span>
      </div>
    </div>
  </div>

  <div id="prog-wrap">
    <div id="prog-track"><div id="prog-fill"></div></div>
    <div id="prog-meta">
      <span id="prog-label">initializing...</span>
      <span id="prog-pct">0%</span>
    </div>
  </div>

  <div id="enter-wrap">
    <button id="enter-btn" onclick="enterSite()"><span>Enter</span></button>
    <p id="enter-hint">// access granted · press enter to continue</p>
  </div>

</div>

<script>
const LINES = [
  { mod: 'BIOS',           msg: 'Hardware integrity check',         badge: 'OK',       bc: 'ok'   },
  { mod: 'KERNEL',         msg: 'Security modules loaded',          badge: 'OK',       bc: 'ok'   },
  { mod: 'NET',            msg: 'Encrypted channel established',    badge: 'OK',       bc: 'ok'   },
  { mod: 'SOC_CORE',       msg: 'Alert triage engine',              badge: 'LOADED',   bc: 'info' },
  { mod: 'LOGIC_APPS',     msg: 'Automation flow engine',           badge: 'ACTIVE',   bc: 'ok'   },
  { mod: 'COPILOT_STUDIO', msg: 'AI integration layer',             badge: 'GROWING',  bc: 'warn' },
  { mod: 'MDCA',           msg: 'Cloud app security policies',      badge: 'ACTIVE',   bc: 'ok'   },
  { mod: 'LEGAL_HOLD',     msg: 'eDiscovery &amp; data preservation', badge: 'ACTIVE',   bc: 'ok'   },
  { mod: 'DATA_PROTECT',   msg: 'Cloud data retrieval workflows',   badge: 'ACTIVE',   bc: 'ok'   },
  { mod: 'AI_AUTOMATE',    msg: 'Team workflow automation',         badge: 'BUILDING', bc: 'warn' },
  { mod: 'LINNUX_TECH',    msg: 'Operator blog system online',      badge: 'READY',    bc: 'ok'   },
];

const LINE_H   = 44;   // must match .tline height in CSS
const CENTER_Y = 110;  // middle of term-body (220px / 2)
const INTERVAL = 500;

const container = document.getElementById('term-lines');
const fill      = document.getElementById('prog-fill');
const pctEl     = document.getElementById('prog-pct');
const labelEl   = document.getElementById('prog-label');

// Build lines
LINES.forEach((l, i) => {
  const el = document.createElement('div');
  el.className = 'tline';
  el.id = 'tl' + i;
  el.innerHTML =
    `<div class="lhs">` +
      `<span class="prompt">$</span>` +
      `<span class="mod">[${l.mod}]</span>` +
      `<span class="arr">→</span>` +
      `<span class="msg">${l.msg}</span>` +
    `</div>` +
    `<span class="badge ${l.bc}">${l.badge}</span>`;
  container.appendChild(el);
});

function setActive(idx) {
  document.querySelectorAll('.tline').forEach((el, i) => {
    el.classList.remove('active', 'near');
    const d = Math.abs(i - idx);
    if (d === 0) el.classList.add('active');
    else if (d === 1) el.classList.add('near');
  });

  // Translate so active line sits at CENTER_Y
  // Active line top = idx * LINE_H, we want its center at CENTER_Y
  const activeMid = idx * LINE_H + LINE_H / 2;
  const offset    = CENTER_Y - activeMid;
  container.style.transform = `translateY(${offset}px)`;

  const p = Math.round(((idx + 1) / LINES.length) * 100);
  fill.style.width  = p + '%';
  pctEl.textContent = p + '%';
  labelEl.textContent = idx < LINES.length - 1
    ? `loading ${LINES[idx].mod.toLowerCase()}...`
    : 'loading linnux_tech...';
}

let current = 0;
setActive(0);

const ticker = setInterval(() => {
  current++;
  if (current >= LINES.length) {
    clearInterval(ticker);
    // Show ACCESS GRANTED + glitch wordmark
    setTimeout(() => {
      document.getElementById('access-granted').classList.add('show');
      pctEl.textContent   = '100%';
      labelEl.textContent = 'system ready';
      fill.style.width    = '100%';
      const wm = document.getElementById('wordmark');
      wm.classList.remove('glitch');
      void wm.offsetWidth;
      wm.classList.add('glitch');
    }, 300);
    // Show enter button
    setTimeout(() => {
      document.getElementById('enter-wrap').classList.add('show');
    }, 1400);
    return;
  }
  setActive(current);
}, INTERVAL);

function enterSite() {
  document.getElementById('curtain').classList.add('on');
  setTimeout(() => { window.location.href = 'home.html'; }, 700);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('enter-wrap').classList.contains('show')) enterSite();
});
</script>
</body>
</html>
